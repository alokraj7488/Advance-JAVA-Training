<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Movie</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #e50914; --accent-hover: #b20710; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--card-bg); }
        h1 { color: var(--text-main); }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 6px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; border: none; cursor: pointer; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-secondary { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--text-muted); }
        .btn-secondary:hover { background-color: var(--text-muted); color: var(--bg-color); }
        .form-container { background-color: var(--card-bg); padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        .form-control { width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid var(--text-muted); background-color: var(--bg-color); color: var(--text-main); font-size: 1rem; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.2); }
        .form-actions { text-align: right; }
        @media (max-width: 768px) { body { padding: 1rem; } header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>➕ Add New Movie</h1>
            <a th:href="@{/movies}" class="btn btn-secondary">← Back to List</a>
        </header>
        <div class="form-container">
            <form th:action="@{/movies/save}" th:object="${movie}" method="post">
                <div class="form-group">
                    <label for="title">Movie Title *</label>
                    <input type="text" id="title" class="form-control" th:field="*{title}" required placeholder="e.g. Inception">
                </div>
                <div class="form-group">
                    <label for="director">Director *</label>
                    <input type="text" id="director" class="form-control" th:field="*{director}" required placeholder="e.g. Christopher Nolan">
                </div>
                <div class="form-group">
                    <label for="genre">Genre</label>
                    <input type="text" id="genre" class="form-control" th:field="*{genre}" placeholder="e.g. Sci-Fi">
                </div>
                <div class="form-group">
                    <label for="releaseYear">Release Year</label>
                    <input type="number" id="releaseYear" class="form-control" th:field="*{releaseYear}" placeholder="2023" min="1900" max="2099">
                </div>
                <div class="form-group">
                    <label for="rating">Rating (0-10)</label>
                    <input type="number" step="0.1" id="rating" class="form-control" th:field="*{rating}" max="10" min="0" placeholder="8.5">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Save Movie</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
