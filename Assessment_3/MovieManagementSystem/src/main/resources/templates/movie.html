<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #e50914; --accent-hover: #b20710; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--card-bg); flex-wrap: wrap; gap: 1rem; }
        h1 { color: var(--text-main); }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 6px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; border: none; cursor: pointer; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-secondary { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--text-muted); }
        .btn-secondary:hover { background-color: var(--text-muted); color: var(--bg-color); }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .detail-view { background-color: var(--card-bg); padding: 2rem; border-radius: 10px; max-width: 800px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .detail-header { border-bottom: 2px solid var(--accent); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .detail-row { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-muted); font-weight: bold; }
        .detail-value { color: var(--text-main); }
        .detail-actions { margin-top: 2rem; text-align: right; display: flex; justify-content: flex-end; gap: 0.5rem; flex-wrap: wrap; }
        .not-found { text-align: center; padding: 3rem; background-color: var(--card-bg); border-radius: 10px; max-width: 600px; margin: 0 auto; }
        @media (max-width: 768px) { body { padding: 1rem; } header { flex-direction: column; text-align: center; } .detail-row { flex-direction: column; gap: 0.5rem; } .detail-actions { justify-content: center; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Movie Details</h1>
            <a th:href="@{/movies}" class="btn btn-secondary">Back to List</a>
        </header>
        <div class="detail-view" th:if="${movie != null}">
            <div class="detail-header">
                <h2 style="color: var(--accent);" th:text="${movie.title}">Movie Title</h2>
            </div>
            <div class="detail-row">
                <span class="detail-label">🎥 Director</span>
                <span class="detail-value" th:text="${movie.director}">Director Name</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">🎭 Genre</span>
                <span class="detail-value" th:text="${movie.genre}">Genre</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">📅 Release Year</span>
                <span class="detail-value" th:text="${movie.releaseYear}">2023</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">⭐ Rating</span>
                <span class="detail-value" th:text="${movie.rating}">8.5</span>
            </div>
            <div class="detail-actions">
                <a th:href="@{/movies/update/{id}(id=${movie.id})}" class="btn btn-primary">Edit Movie</a>
                <a th:href="@{/movies/delete/{id}(id=${movie.id})}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this movie?')">Delete</a>
            </div>
        </div>
        <div class="not-found" th:if="${movie == null}">
            <h2 style="color: var(--danger)">⚠️ Movie Not Found</h2>
            <p style="color: var(--text-muted); margin-top: 1rem;">The movie you are looking for does not exist.</p>
            <br>
            <a th:href="@{/movies}" class="btn btn-secondary">Back to List</a>
        </div>
    </div>
</body>
</html>
