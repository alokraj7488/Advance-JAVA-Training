<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Library</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #e50914; --accent-hover: #b20710; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--card-bg); flex-wrap: wrap; gap: 1rem; }
        h1 { color: var(--text-main); }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 6px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; border: none; cursor: pointer; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-secondary { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--text-muted); }
        .btn-secondary:hover { background-color: var(--text-muted); color: var(--bg-color); }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .movie-card { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .movie-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.4); }
        .card-body { padding: 1.5rem; flex-grow: 1; }
        .card-title { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--accent); }
        .card-text { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .card-actions { padding: 1rem 1.5rem; background-color: rgba(0,0,0,0.2); display: flex; justify-content: flex-end; gap: 0.5rem; flex-wrap: wrap; }
        .empty-state { text-align: center; padding: 3rem; background-color: var(--card-bg); border-radius: 10px; }
        @media (max-width: 768px) { body { padding: 1rem; } header { flex-direction: column; text-align: center; } .movie-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Movie Library</h1>
            <a th:href="@{/movies/add}" class="btn btn-primary">+ Add New Movie</a>
        </header>
        <div class="movie-grid" th:if="${movies != null and !movies.isEmpty()}">
            <div class="movie-card" th:each="movie : ${movies}">
                <div class="card-body">
                    <h3 class="card-title" th:text="${movie.title != null ? movie.title : 'Untitled'}">Movie Title</h3>
                    <p class="card-text"><strong>Genre:</strong> <span th:text="${movie.genre != null ? movie.genre : 'N/A'}">N/A</span></p>
                    <p class="card-text"><strong>Year:</strong> <span th:text="${movie.releaseYear != null ? movie.releaseYear : 'N/A'}">N/A</span></p>
                    <p class="card-text"><strong>Rating:</strong> <span th:text="${movie.rating != null ? movie.rating : 'N/A'}">N/A</span></p>
                </div>
                <div class="card-actions">
                    <a th:if="${movie.id != null}" th:href="@{/movies/{id}(id=${movie.id})}" class="btn btn-secondary">View</a>
                    <a th:if="${movie.id != null}" th:href="@{/movies/update/{id}(id=${movie.id})}" class="btn btn-primary">Edit</a>
                    <a th:if="${movie.id != null}" th:href="@{/movies/delete/{id}(id=${movie.id})}" class="btn btn-danger" onclick="return confirm('Delete this movie?')">Delete</a>
                </div>
            </div>
        </div>
        <div class="empty-state" th:if="${movies == null or movies.isEmpty()}">
            <h2 style="color: var(--text-muted)">🎬 No movies found</h2>
            <p style="margin: 1rem 0; color: var(--text-muted)">Start by adding your first movie!</p>
            <a th:href="@{/movies/add}" class="btn btn-primary">+ Add Movie</a>
        </div>
    </div>
</body>
</html>
